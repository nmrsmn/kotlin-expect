name: Kotlin Expect - Pull request validation

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality-checks:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Run code quality checks (ktlint and detekt)
              id: checks
              run: ./gradlew check
